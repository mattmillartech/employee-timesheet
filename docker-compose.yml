# Dual-purpose compose: local dev exposes 3000:80; production deploy on Redpill
# joins the external `npm_proxy` network instead (NPM reaches the container
# by name on port 80). Use `docker-compose.override.yml` (gitignored) to
# drop the external network on pure-local dev machines.

services:
  timesheet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_ALLOWED_GOOGLE_EMAIL: ${VITE_ALLOWED_GOOGLE_EMAIL:-}
        VITE_SHEET_ID: ${VITE_SHEET_ID:-}
    container_name: timesheet
    restart: unless-stopped
    environment:
      # Sidecar is stateless — no runtime secrets required. Each /api/*
      # request carries its own OAuth bearer token and ?sheetId= query param.
      NODE_ENV: production
    ports:
      - "3000:80"
    networks:
      - npm_proxy
    labels:
      - "watchdog=true"

networks:
  npm_proxy:
    external: true
